name: Download Artifact Demo

on:
  workflow_dispatch:

jobs:
  create-report:
    runs-on: ubuntu-latest

    steps:
      - name: Create report file
        run: |
          echo "This report was created by Job 1." > report.txt

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: report-file
          path: report.txt

  use-report:
    needs: create-report
    runs-on: ubuntu-latest

    steps:
      - name: Download report
        uses: actions/download-artifact@v4
        with:
          name: report-file
          path: downloaded-report

      - name: List downloaded files
        run: |
          pwd
          ls -R

      - name: Read report
        run: |
          cat downloaded-report/report.txt