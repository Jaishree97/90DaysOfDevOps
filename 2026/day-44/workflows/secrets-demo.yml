name: GitHub Secrets Demo

on:
    workflow_dispatch:


jobs:
    check-secret:
        runs-on: ubuntu-latest
        steps:
            - name: Check if secret exists
              run: |
                if [ -n "${{ secrets.MY_SECRET_MESSAGE}}" ]; then
                  echo "The secret is set successfully."
                else
                  echo "The secret is missing."
                fi

            - name: Print the secret (for learning only)
              run: |
                echo "The secret is: ${{ secrets.MY_SECRET_MESSAGE }}"