# Nested Objects
server:
  name: web-server
  ip_address: 192.168.1.10
  port: 80

database:
  host: localhost
  name: dev_db
  credentials:
    - username: db_user
    - password: db_password
      

startup_script: |
  sudo apt update
  sudo apt install nginx -y
  sudo systemctl start nginx

description: >
  This server hosts
  our production website
  and runs Nginx
 